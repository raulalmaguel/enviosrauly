<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMESAS RAULY | Holguín y Banes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-rauly { background-color: #003366; }
        .text-rauly { color: #003366; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <nav class="bg-rauly text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-widest">REMESAS RAULY</h1>
            <i class="fas fa-paper-plane"></i>
        </div>
    </nav>

    <!-- Hero -->
    <div class="bg-rauly text-white py-12 px-6 text-center">
        <h2 class="text-3xl font-bold mb-2">Entregas en Holguín y Banes</h2>
        <p class="opacity-90">Efectivo en mano (CUP) directo a la casa.</p>
    </div>

    <!-- Calculadora -->
    <main class="container mx-auto p-4 -mt-8">
        <div class="bg-white rounded-xl shadow-xl p-6 mb-6">
            <h3 class="text-center font-bold text-gray-700 mb-4 uppercase">1. Selecciona tu país</h3>
            <div class="grid grid-cols-3 gap-2 mb-8">
                <button onclick="update('MXN', 27)" class="border-2 border-blue-200 rounded-lg p-3 hover:bg-blue-50 focus:bg-blue-100 focus:border-blue-600 transition">
                    <span class="block text-2xl">🇲🇽</span>
                    <span class="text-xs font-bold">México</span>
                </button>
                <button onclick="update('CAD', 305)" class="border-2 border-blue-200 rounded-lg p-3 hover:bg-blue-50 focus:bg-blue-100 focus:border-blue-600 transition">
                    <span class="block text-2xl">🇨🇦</span>
                    <span class="text-xs font-bold">Canadá</span>
                </button>
                <button onclick="update('USD', 490)" class="border-2 border-blue-200 rounded-lg p-3 hover:bg-blue-50 focus:bg-blue-100 focus:border-blue-600 transition">
                    <span class="block text-2xl">🇺🇸</span>
                    <span class="text-xs font-bold">USA</span>
                </button>
            </div>

            <div id="calc-box" class="hidden">
                <div class="mb-4">
                    <label class="block text-gray-600 text-sm font-bold mb-1">Tú envías (<span id="cur">MXN</span>):</label>
                    <input type="number" id="amt" oninput="calc()" class="w-full p-4 border-2 border-gray-200 rounded-lg text-xl font-bold focus:border-blue-500 outline-none" placeholder="0.00">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-600 text-sm font-bold mb-1">Reciben en Cuba (CUP):</label>
                    <div class="w-full p-4 bg-green-50 border-2 border-green-200 rounded-lg text-2xl font-bold text-green-700" id="res">0.00</div>
                </div>

                <div id="methods" class="bg-blue-50 p-4 rounded-lg mb-6 border-l-4 border-blue-600">
                    <p class="text-sm font-bold text-blue-900 mb-2 underline text-center">VÍAS DE PAGO DISPONIBLES:</p>
                    <div id="method-list" class="text-sm text-blue-800 space-y-1"></div>
                </div>

                <a id="wa-btn" href="#" target="_blank" class="block w-full bg-green-600 text-white text-center py-4 rounded-lg font-bold shadow-lg hover:bg-green-700 transition">
                    <i class="fab fa-whatsapp mr-2"></i> CONTACTAR POR WHATSAPP
                </a>
            </div>
        </div>

        <!-- Cobertura -->
        <div class="bg-white rounded-xl shadow p-6 border-t-4 border-yellow-500">
            <h4 class="font-bold text-rauly mb-3"><i class="fas fa-map-marker-alt mr-2"></i>ZONAS DE ENTREGA</h4>
            <ul class="text-gray-600 text-sm space-y-2">
                <li class="flex items-center"><i class="fas fa-check text-green-500 mr-2"></i> Holguín (Ciudad)</li>
                <li class="flex items-center"><i class="fas fa-check text-green-500 mr-2"></i> Banes</li>
                <li class="flex items-center"><i class="fas fa-check text-green-500 mr-2"></i> Entrega a domicilio incluida</li>
            </ul>
        </div>
    </main>

    <script>
        let currentRate = 0;
        let currentCur = '';

        function update(cur, rate) {
            currentRate = rate;
            currentCur = cur;
            document.getElementById('cur').innerText = cur;
            document.getElementById('calc-box').classList.remove('hidden');
            
            const mList = document.getElementById('method-list');
            if(cur === 'MXN') {
                mList.innerHTML = '• Depósito/Transferencia <b>BBVA</b><br>• Depósito/Transferencia <b>BANCOPPEL</b><br>• Depósito en <b>OXXO</b>';
            } else if(cur === 'CAD') {
                mList.innerHTML = '• <b>INTERAC</b> e-Transfer<br>• PayPal (Saldo)';
            } else {
                mList.innerHTML = '• <b>ZELLE</b><br>• Western Union<br>• PayPal';
            }
            calc();
        }

        function calc() {
            const amt = document.getElementById('amt').value;
            const res = document.getElementById('res');
            const total = amt * currentRate;
            res.innerText = total.toLocaleString() + ' CUP';
            
            const msg = `Hola Rauly, quiero enviar ${amt} ${currentCur} para que entregues ${total} CUP en efectivo en Cuba.`;
            document.getElementById('wa-btn').href = `https://wa.me/TUNUMEROAQUI?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
